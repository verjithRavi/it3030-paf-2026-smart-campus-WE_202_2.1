spring.config.import=optional:file:./application-local.properties,optional:file:./.env[.properties]
spring.application.name=smart-campus-backend

server.port=8080
spring.data.mongodb.uri=${MONGODB_URI:${spring.data.mongodb.uri:}}
spring.data.mongodb.database=${MONGODB_DATABASE:${spring.data.mongodb.database:}}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.frontend.url=${FRONTEND_URL}
spring.data.mongodb.auto-index-creation=true
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
